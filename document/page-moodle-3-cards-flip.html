<!--
  Page Moodle �?" 3 cartes à retournement (flip) au clic, sur une seule ligne.
  Coller dans une ressource Page, mode HTML/code source.
  Si Moodle supprime le <style>, les cartes restent visibles mais sans animation de retournement.
-->
<style>
  .flip-cards-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.25rem; margin: 1rem 0; max-width: 100%; }
  .flip-wrap { flex: 1; min-width: 200px; max-width: 280px; perspective: 800px; }
  .flip-wrap input { position: absolute; opacity: 0; pointer-events: none; }
  .flip-wrap label { display: block; cursor: pointer; height: 180px; margin: 0; }
  .flip-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s ease; }
  .flip-wrap input:checked ~ label .flip-inner { transform: rotateY(180deg); }
  .flip-face { position: absolute; width: 100%; height: 100%; left: 0; top: 0; backface-visibility: hidden; border-radius: 12px; padding: 1.25rem; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .flip-front { background: linear-gradient(135deg, #2A325E, #580F45); color: #fff; }
  .flip-back { background: #fff; color: #2A325E; border: 2px solid #2EAF7D; transform: rotateY(180deg); }
  .flip-face h3 { margin: 0 0 0.5rem; font-size: 1rem; font-weight: 800; }
  .flip-front h3 { color: #fff; }
  .flip-back h3 { color: #580F45; }
  .flip-face p { margin: 0; font-size: 0.85rem; line-height: 1.4; }
  .flip-front p { opacity: 0.95; }
  .flip-back p { color: #555; }
  .flip-hint { font-size: 0.75rem; opacity: 0.8; margin-top: 0.5rem; }
</style>

<p dir="ltr" style="text-align: center; font-size: 0.9rem; color: #555; margin-bottom: 0.5rem;">Cliquez sur une carte pour la retourner.</p>

<div dir="ltr" class="flip-cards-row">
  <!-- Carte 1 -->
  <div class="flip-wrap">
    <input type="checkbox" id="flip1" aria-hidden="true" />
    <label for="flip1">
      <div class="flip-inner">
        <div class="flip-face flip-front">
          <h3>Savoir</h3>
          <p>Connaissances</p>
          <span class="flip-hint">Cliquer pour retourner</span>
        </div>
        <div class="flip-face flip-back">
          <h3>Savoir</h3>
          <p>Démystifier le vocabulaire de l'innovation et identifier les méthodologies de conception.</p>
        </div>
      </div>
    </label>
  </div>
  <!-- Carte 2 -->
  <div class="flip-wrap">
    <input type="checkbox" id="flip2" aria-hidden="true" />
    <label for="flip2">
      <div class="flip-inner">
        <div class="flip-face flip-front">
          <h3>Savoir-faire</h3>
          <p>Opérationnel</p>
          <span class="flip-hint">Cliquer pour retourner</span>
        </div>
        <div class="flip-face flip-back">
          <h3>Savoir-faire</h3>
          <p>Analyser un projet sous l'angle de son impact et distinguer les voies de valorisation.</p>
        </div>
      </div>
    </label>
  </div>
  <!-- Carte 3 -->
  <div class="flip-wrap">
    <input type="checkbox" id="flip3" aria-hidden="true" />
    <label for="flip3">
      <div class="flip-inner">
        <div class="flip-face flip-front">
          <h3>Savoir-être</h3>
          <p>Posture</p>
          <span class="flip-hint">Cliquer pour retourner</span>
        </div>
        <div class="flip-face flip-back">
          <h3>Savoir-être</h3>
          <p>Posture réflexive et autonomie face au monde de l'entreprise.</p>
        </div>
      </div>
    </label>
  </div>
</div>

<p dir="ltr" style="text-align: left;"><br></p>
